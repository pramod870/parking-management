security:
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 12

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_OPERATOR: ROLE_USER
        ROLE_ADMIN:    [ROLE_OPERATOR, ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        register:
            pattern:  ^/api/auth/register$
            stateless: true
            security: false

        login:
            pattern:  ^/api/auth/login$
            stateless: true
            json_login:
                check_path:      /api/auth/login
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
                username_path:   email
                password_path:   password

        api:
            pattern:   ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login,    roles: PUBLIC_ACCESS }
        - { path: ^/api/lots$,         roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/lots/\d+$,     roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/auth/profile,  roles: ROLE_USER }
        - { path: ^/api/bookings,      roles: ROLE_USER }
        - { path: ^/api/sessions,      roles: ROLE_OPERATOR }
        - { path: ^/api/dashboard,     roles: ROLE_ADMIN }
        - { path: ^/api/admin,         roles: ROLE_ADMIN }
        - { path: ^/api,               roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4