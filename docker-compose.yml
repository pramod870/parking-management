version: '3.9'

services:

  # ── PHP-FPM App ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: parking_app
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://parking_user:123456@postgres:5432/parking_db?serverVersion=16
      JWT_SECRET_KEY: /var/www/config/jwt/private.pem
      JWT_PUBLIC_KEY:  /var/www/config/jwt/public.pem
      JWT_PASSPHRASE:  ${JWT_PASSPHRASE}
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - parking_net

  # ── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: parking_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - parking_net

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: parking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       parking_db
      POSTGRES_USER:     parking_user
      POSTGRES_PASSWORD: parking_pass
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking_user -d parking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_net

  # ── Redis (caching) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parking_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - parking_net

  # ── pgAdmin (optional dev tool) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: parking_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@parking.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - parking_net
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  parking_net:
    driver: bridge

